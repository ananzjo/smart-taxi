<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | المصروفات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="expenses.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>💰 إدارة المصروفات | Expenses Management</span>
                
            </div>
            
            <form id="expenseForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>التاريخ | Date</label><input type="date" id="f02_date" required></div>
                    <div class="form-group">
                        <label>رقم السيارة | Car</label>
                        <select id="f03_car_no" required>
                            <option value="">-- اختر السيارة --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>نوع المصروف | Expense Type</label>
                        <select id="f05_expense_type" required>
                            <option value="صيانة">صيانة | Maintenance</option>
                            <option value="وقود">وقود | Fuel</option>
                            <option value="قطع غيار">قطع غيار | Spare Parts</option>
                            <option value="رسوم">رسوم | Fees</option>
                            <option value="تأمين">تأمين | Insurance</option>
                            <option value="أخرى">أخرى | Other</option>
                        </select>
                    </div>
                    <div class="form-group"><label>المبلغ | Amount</label><input type="number" step="0.01" id="f07_amount" required></div>
                    <div class="form-group"><label>المورد / البائع | Seller</label><input type="text" id="f06_seller" placeholder="اسم المورد..."></div>
                    <div class="form-group"><label>رقم المرجع | Ref No.</label><input type="text" id="f08_ref_no" placeholder="فاتورة / رقم..."></div>
                    <div class="form-group">
                        <label>المسؤول | Officer</label>
                        <select id="f09_user_id">
                            <option value="">-- اختر المسؤول --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الحالة | Status</label>
                        <select id="f10_status">
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approved</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>ملاحظات | Notes</label>
                    <textarea id="f11_notes" rows="2"></textarea>
                </div>
            
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card" style="padding: 0;">
            <div class="table-header-controls">
                <div class="record-badge">
                    <span id="pageRecordCount">0</span> مصروف
                </div>
                <div class="global-search-wrapper">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="بحث شامل..." onkeyup="multiColumnSearch()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div id="tableContainer" class="table-responsive" style="padding: 0 20px 20px 20px;"></div>
        </div>
    </main>

    <script src="expenses.js"></script>
    <script>
        window.onload = async () => { 
            bootSystem("إدارة المصروفات"); 
            await fillExpenseDropdowns();
            await loadData(); 
            if(!document.getElementById('f01_id').value) {
                document.getElementById('f02_date').valueAsDate = new Date();
            }
        };
    </script>

</body>
</html>
