<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- 
    File: suppliers.html
    Version: v1.3.0
    Function: إدارة الموردين | Suppliers Management
    Design: Unified Dual-Language Format (Form at Top, Grid at Bottom)
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الموردين | Suppliers Management</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="suppliers.css">
    <link rel="stylesheet" href="revenues.css"> <!-- Reusing unified luxury grid styles -->
</head>
<body onload="bootSystem('إدارة الموردين | Suppliers')">

    <div class="main-container">
        
        <!-- Header -->
        <div class="luxury-page-header">
            <div class="header-info">
                <h1>👤 إدارة الموردين | Suppliers</h1>
                <p>تنظيم بيانات جهات الصيانة ومزودي الخدمات | Maintenance & Service Providers</p>
            </div>
        </div>

        <!-- Section 1: Entry Form (Now visible on page) -->
        <div class="elegant-card luxury-card-border">
            <div class="card-header">
                <span>📝 نماذج البيانات | Data Entry Form</span>
            </div>
            <form id="supplierForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>اسم المورد | Supplier Name</label>
                        <input type="text" id="f02_supplier_name" placeholder="مثال: كراج الأمانة (t12_suppliers.f02_supplier_name)" required>
                    </div>

                    <div class="form-group">
                        <label>الشخص المسؤول | Contact Person</label>
                        <input type="text" id="f03_contact_person" placeholder="اسم جهة الاتصال (t12_suppliers.f03_contact_person)">
                    </div>

                    <div class="form-group">
                        <label>رقم الهاتف | Phone No</label>
                        <input type="tel" id="f04_phone" placeholder="07XXXXXXXX (t12_suppliers.f04_phone)">
                    </div>

                    <div class="form-group">
                        <label>العنوان | Address</label>
                        <input type="text" id="f05_address" placeholder="المدينة، الشارع (t12_suppliers.f05_address)">
                    </div>

                    <div class="form-group">
                        <label>الرقم الضريبي | Tax ID</label>
                        <input type="text" id="f06_tax_info" placeholder="الرقم الضريبي إن وجد (t12_suppliers.f06_tax_info)">
                    </div>

                    <div class="form-group full-width">
                        <label>ملاحظات إضافية | Notes</label>
                        <textarea id="f07_notes" rows="2" placeholder="أدخل أي ملاحظات هامة (t12_suppliers.f07_notes)"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-btn">حفظ البيانات | Save Data ✅</button>
                    <button type="reset" class="secondary-btn">تفريغ | Reset 🔄</button>
                </div>
            </form>
        </div>

        <!-- Section 2: Unified Grid Controls -->
        <div id="tableControlsPlaceholder"></div>

        <!-- Section 3: Data Grid -->
        <div class="elegant-card grid-card">
            <div class="card-header">
                <span>📋 سجل الموردين | Suppliers Ledger</span>
            </div>
            <div id="suppliersTableContainer" class="table-responsive">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات... | Loading Data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="suppliers.js"></script>
</body>
</html>
<!-- END OF FILE: suppliers.html -->
