<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السيارات - نظام إدارة التاكسي الذكي</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
    <link rel="stylesheet" href="global-style.css">
    <link rel="stylesheet" href="cars-style.css">
    <link rel="stylesheet" href="cars-responsive.css">

</head>
<body>

    <main class="main-content">
        <div class="elegant-card">
            <h2 style="text-align: center; color: var(--taxi-dark); margin-bottom: 30px;">🚖 تسجيل وتعديل بيانات المركبات</h2>
            
            <form id="carForm" onsubmit="event.preventDefault(); saveData();">
                <input type="hidden" id="f01">

                <div class="input-grid">
                    <div class="form-group">
                        <label>رقم اللوحة (f02)</label>
                        <input type="text" id="f02" placeholder="مثال: 10-12345" required>
                    </div>
                    <div class="form-group">
                        <label>مكتب التاكسي (f03)</label>
                        <input type="text" id="f03" placeholder="اسم المكتب">
                    </div>
                    <div class="form-group">
                        <label>العلامة التجارية (f04)</label>
                        <input type="text" id="f04" placeholder="مثال: تويوتا">
                    </div>
                    <div class="form-group">
                        <label>نوع السيارة (f05)</label>
                        <input type="text" id="f05" placeholder="مثال: كامري">
                    </div>
                    <div class="form-group">
                        <label>الموديل - السنة (f06)</label>
                        <input type="number" id="f06" placeholder="مثال: 2024">
                    </div>
                    <div class="form-group">
                        <label>انتهاء الترخيص (f07)</label>
                        <input type="date" id="f07">
                    </div>
                    <div class="form-group">
                        <label>الضمان اليومي (f08)</label>
                        <input type="number" id="f08" step="0.01" value="0">
                    </div>
                    <div class="form-group">
                        <label>رسوم الإدارة (f09)</label>
                        <input type="number" id="f09" step="0.01" value="0">
                    </div>
                    <div class="form-group">
                        <label>الموظف المسؤول (f10)</label>
                        <input type="text" id="f10">
                    </div>
                    <div class="form-group">
                        <label>رقم المالك (f11)</label>
                        <input type="text" id="f11">
                    </div>
                    <div class="form-group">
                        <label>حالة المركبة (f12)</label>
                        <select id="f12">
                            <option value="نشط">نشط</option>
                            <option value="صيانة">صيانة</option>
                            <option value="متوقفة">متوقفة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>السائق الحالي (f13)</label>
                        <input type="text" id="f13" placeholder="اسم السائق">
                    </div>
                    <div class="form-group">
                        <label>نوع الوقود (f15)</label>
                        <select id="f15">
                            <option value="بنزين">بنزين</option>
                            <option value="هايبرد">هايبرد</option>
                            <option value="كهرباء">كهرباء</option>
                            <option value="ديزل">ديزل</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>ملاحظات إضافية (f14)</label>
                        <textarea id="f14" rows="3" style="width: 100%; max-width: 100%; border-radius: 12px; border: 2px solid #e2e8f0; padding: 10px;"></textarea>
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="btn-save">حفظ بيانات المركبة 💾</button>
                <button type="button" onclick="location.reload()" class="btn-save" style="background:#666; border-color:#666; margin-top:10px;">إلغاء / جديد ➕</button>
            </form>
        </div>

        <div class="elegant-card" style="margin-top: 20px;">
            <div id="tableContent">
                <p style="text-align: center;">جاري تحميل البيانات...</p>
            </div>
        </div>
    </main>

    <script src="global-config.js"></script>
    <script src="cars-logic.js"></script>

</body>

</html>
