<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | المدفوعات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="payments.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>💰 إدارة المدفوعات | Payments Management</span>
                
            </div>
            
            <form id="paymentForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>التاريخ | Date</label><input type="date" id="f02_date" required></div>
                    <div class="form-group">
                        <label>نوع الدفع | Type</label>
                        <select id="f03_type" required>
                            <option value="">صيانة | Maintenance</option>
                            <option value="">ترخيص | License</option>
                            <option value="">وقود | Fuel</option>
                            <option value="">مخالفات | Fines</option>
                            <option value="">تأمين | Insurance</option>
                            <option value="">رسوم هيئة  النقل | Transport Authority Fees</option>
                            <option value="">رسوم مكتب | Office Fees</option>
                            <option value="">راتب | Salary</option>
                            <option value="مكافأة">مكافأة | Bonus</option>
                            <option value="سلفة">سلفة | Advance</option>
                            <option value="دفعة مالك">دفعة مالك | Owner Payment</option>
                            <option value="أخرى">أخرى | Other</option>
                        </select>
                    </div>
                    <div class="form-group"><label>المبلغ | Amount</label><input type="number" step="0.01" id="f04_amount" required></div>
                    <div class="form-group">
                        <label>رقم السيارة | Car No.</label>
                        <select id="f05_car_no">
                            <option value="">-- اختياري --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>طريقة الدفع | Method</label>
                        <select id="f07_method">
                            <option value="نقدي">نقدي | Cash</option>
                            <option value="بنك">بنك | Bank</option>
                            <option value="محفظة">محفظة | E-Wallet</option>
                        </select>
                    </div>
                    <div class="form-group"><label>الدافع | Payer</label><input type="text" id="f08_payer" placeholder="اسم الدافع..."></div>
                    <div class="form-group"><label>المستلم | Recipient</label><input type="text" id="f09_recipient" placeholder="اسم المستلم..."></div>
                    <div class="form-group"><label>المرجع | Reference</label><input type="text" id="f10_reference" placeholder="رقم المرجع..."></div>
                </div>
                <div class="form-group full-width">
                    <label>ملاحظات | Notes</label>
                    <textarea id="f13_notes" rows="2"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card" style="padding: 0;">
            <div class="table-header-controls">
                <div class="record-badge">
                    <span id="pageRecordCount">0</span> دفعة
                </div>
                <div class="global-search-wrapper">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="بحث شامل..." onkeyup="multiColumnSearch()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div id="tableContainer" class="table-responsive" style="padding: 0 20px 20px 20px;"></div>
        </div>

    <!-- script tags for bootSystem -->
    <script src="payments.js"></script>
    <script>
        window.onload = async () => { 
            bootSystem("إدارة المدفوعات"); 
            await fillPaymentDropdowns();
            await loadData(); 
            document.getElementById('f02_date').valueAsDate = new Date();
        };
    </script>

</body>
</html>
