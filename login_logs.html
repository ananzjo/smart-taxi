<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل الأمان | نظام التاكسي الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <script src="login_logs.js"></script>
    <link rel="stylesheet" href="revenues.css"> </head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header">
                <span>🛡️ مراقبة سجلات الدخول والأمان | Security Audit Logs</span>
            </div>
            
            <div class="excel-controls">
                <span>📋 قائمة محاولات الدخول</span>
                <input type="text" id="logSearch" placeholder="بحث باسم المستخدم أو الـ IP..." onkeyup="filterLogs()">
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>التاريخ والوقت</th>
                            <th>المستخدم</th>
                            <th>الحالة</th>
                            <th>السبب</th>
                            <th>عنوان IP</th>
                            <th>الموقع</th>
                            <th>الجهاز</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="login_logs.js"></script>
    <script>
        window.onload = () => {
            bootSystem("سجل الأمان");
            loadLoginLogs();
        };
    </script>
</body>
</html>
