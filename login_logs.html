<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | سجل الدخول</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="login_logs.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card" style="padding: 0;">
            <div class="table-header-controls">
                <div class="record-badge">
                    <span id="pageRecordCount">0</span> سجل
                </div>
                <div style="font-weight:700; color: var(--taxi-dark); font-size: 1.1rem; margin-right: 20px;">📋 سجل تاريخ الدخول للمستخدمين</div>
                <div class="global-search-wrapper" style="width:300px;">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="بحث شامل..." onkeyup="multiColumnSearch()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div id="tableContainer" class="table-responsive" style="padding: 0 20px 20px 20px;"></div>
        </div>
    </main>

    <script src="login_logs.js"></script>
    <script>
        window.onload = () => { 
            bootSystem("سجل الدخول"); 
            loadData();
        };
    </script>
</body>
</html>
