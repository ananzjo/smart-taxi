<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل الأمان | نظام التاكسي الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <script src="login_logs.js"></script>
    <link rel="stylesheet" href="revenues.css"> </head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header">
                <span>🛡️ مراقبة سجلات الدخول والأمان | Security Audit Logs</span>
            </div>
            
            <div class="excel-controls">
                <span>📋 قائمة محاولات الدخول</span>
                <input type="text" id="logSearch" placeholder="بحث باسم المستخدم أو الـ IP..." onkeyup="filterLogs()">
            </div>
            <div class="table-info-bar">
                <span class="record-badge">عدد السجلات: <span id="recordCount">0</span></span>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortData('f02_datetime')" style="cursor:pointer">التاريخ والوقت ↕</th>
                            <th onclick="sortData('f03_username')" style="cursor:pointer">المستخدم ↕</th>
                            <th onclick="sortData('f04_status')" style="cursor:pointer">الحالة ↕</th>
                            <th onclick="sortData('f05_failure_reason')" style="cursor:pointer">السبب ↕</th>
                            <th onclick="sortData('f06_ip_address')" style="cursor:pointer">عنوان IP ↕</th>
                            <th onclick="sortData('f08_device_info')" style="cursor:pointer">الجهاز ↕</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="login_logs.js"></script>
    <script>
        window.onload = () => {
            bootSystem("سجل الأمان");
            loadLoginLogs();
        };
    </script>
</body>
</html>
