<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدخول | نظام إدارة التاكسي الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    
    <style>
        :root { --taxi-gold: #f1c40f; --taxi-dark: #121212; }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 25px;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center; color: white;
        }
        .welcome-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; position: relative; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--taxi-gold); }
        .login-input {
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .login-input:focus { border-color: var(--taxi-gold); background: rgba(255,255,255,0.15); }
        .pass-toggle { position: absolute; left: 15px; top: 38px; cursor: pointer; color: #ccc; }
        .login-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--taxi-gold);
            color: var(--taxi-dark); font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .login-btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(241, 196, 15, 0.3); }
    </style>
</head>
<body>
    <div class="login-glass-card">
        <div class="welcome-icon">🚖</div>
        <h2 style="margin: 0 0 5px 0;">مرحباً بك دكتور</h2>
        <p style="margin-bottom: 30px; opacity: 0.7;">بوابة الدخول للنظام العظيم</p>

        <form id="loginForm" onsubmit="event.preventDefault(); loginProcess();">
            <div class="form-group">
                <label>اسم المستخدم | Username</label>
                <input type="text" id="username" class="login-input" placeholder="اسمك المسجل..." required>
            </div>

            <div class="form-group">
                <label>كلمة المرور | Password</label>
                <input type="password" id="password" class="login-input" placeholder="••••••••" required>
                <span class="pass-toggle" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit" id="submitBtn" class="login-btn">دخول للنظام 🚀 | Login</button>
        </form>
    </div>

    <script>
        // 1. دالة إظهار/إخفاء كلمة المرور
        function togglePassword() {
            const passInput = document.getElementById('password');
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
        }

        // 2. دالة تسجيل الأحداث (التي تنفذ الـ Insert في t15_login_logs)
        async function recordLoginEvent(username, status, reason = null) {
            let ipData = { ip: 'Unknown', city: 'Unknown' };
            try {
                // محاولة جلب الموقع والـ IP
                const res = await fetch('https://ipapi.co/json/');
                if (res.ok) ipData = await res.json();
            } catch (e) { console.log("IP fetch failed"); }

            const payload = {
                f03_username: username || 'Unknown',
                f04_status: status,
                f05_failure_reason: reason,
                f06_ip_address: ipData.ip,
                f07_location: `${ipData.city || ''}, ${ipData.country_name || ''}`,
                f08_device_info: navigator.userAgent
            };

            // تنفيذ الإضافة في جدول t15_login_logs
            await _supabase.from('t15_login_logs').insert([payload]);
        }

        // 3. محرك الدخول الرئيسي
        async function loginProcess() {
    const userField = document.getElementById('username');
    const passField = document.getElementById('password');
    const btn = document.getElementById('submitBtn');

    const user = userField.value.trim();
    const pass = passField.value; // نأخذ القيمة مباشرة كما هي

    if (!user || !pass) {
        alert("يرجى إدخال البيانات");
        return;
    }

    btn.disabled = true;
    btn.innerText = "جاري التحقق... ⏳";

    // [1] تسجيل المحاولة (استخدام try/catch لضمان عدم توقف الكود إذا فشل السجل)
    try {
        await recordLoginEvent(user, 'Attempt', 'محاولة دخول');
    } catch(e) { console.error("Log failed", e); }

    // [2] جلب البيانات من Supabase
    const { data, error } = await _supabase
        .from('t11_staff')
        .select('*')
        .eq('f08_login_name', user); // سحبنا المصفوفة بالكامل للتأكد

    // [3] التحقق من النتيجة
    if (error || !data || data.length === 0) {
        await recordLoginEvent(user, 'Failure', 'المستخدم غير موجود');
        alert("اسم المستخدم غير صحيح");
        resetLoginBtn(btn);
        return;
    }

    const staff = data[0]; // نأخذ أول موظف تم العثور عليه

    // [4] المقارنة المباشرة (هنا كان الخطأ)
    if (String(staff.f09_password) === String(pass)) {
        // نجاح الدخول
        await recordLoginEvent(user, 'Success', 'دخول ناجح');
        sessionStorage.setItem('full_name_ar', staff.f02_name);
        window.location.href = 'dashboard.html';
    } else {
        // فشل كلمة المرور
        await recordLoginEvent(user, 'Failure', 'كلمة مرور خطأ');
        alert("كلمة المرور غير صحيحة!");
        resetLoginBtn(btn);
    }
}
        function resetLoginBtn(btn) {
            btn.disabled = false;
            btn.innerText = "دخول للنظام 🚀 | Login";
        }
    </script>
</body>
</html>
