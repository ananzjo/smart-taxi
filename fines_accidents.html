<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- 
    File: fines_accidents.html
    Version: v1.3.0
    Function: إدارة المخالفات والحوادث | Fines & Accidents Management
    Design: Unified Dual-Language Format (Form at Top, Grid at Bottom)
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخالفات والحوادث | Fines & Accidents</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="fines_accidents.css">
    <link rel="stylesheet" href="revenues.css">
</head>
<body onload="bootSystem('المخالفات والحوادث | Fines')">

    <div class="main-container">
        
        <!-- Header -->
        <div class="luxury-page-header">
            <div class="header-info">
                <h1>⚠️ المخالفات والحوادث | Fines & Accidents</h1>
                <p>تسجيل ومتابعة الذمم المالية المترتبة على الحوادث والمخالفات | Incident Records</p>
            </div>
        </div>

        <!-- Section 1: Entry Form (Now visible on page) -->
        <div class="elegant-card luxury-card-border border-red">
            <div class="card-header">
                <span>📝 نماذج البلاغ | Incident Entry Form</span>
            </div>
            <form id="finesForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>التاريخ | Incident Date</label>
                        <input type="date" id="f02_date" required title="تاريخ الواقعة (t09_fines_accidents.f02_date)">
                    </div>

                    <div class="form-group">
                        <label>السيارة | Plate No</label>
                        <select id="f03_car_no" required title="رقم اللوحة (t09_fines_accidents.f03_car_no)">
                            <option value="">-- اختر السيارة --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>السائق المسؤول | Driver</label>
                        <select id="f04_driver_id" required title="السائق المتسبب (t09_fines_accidents.f04_driver_id)">
                            <option value="">-- اختر السائق --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>النوع | Type</label>
                        <select id="f06_type" required>
                            <option value="مخالفة مرورية">مخالفة مرورية | Traffic Fine</option>
                            <option value="حادث سير">حادث سير | Road Accident</option>
                            <option value="ضرر فني">ضرر فني | Technical Damage</option>
                            <option value="أخرى">أخرى | Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المبلغ المطلوب | Fine Amount</label>
                        <input type="number" id="f05_amount" step="0.5" placeholder="0.00 (t09_fines_accidents.f05_amount)" required>
                    </div>

                    <div class="form-group">
                        <label>حالة الذمة | Record Status</label>
                        <select id="f07_status">
                            <option value="Pending">معلق | Pending</option>
                            <option value="Paid">مسدد | Paid</option>
                            <option value="Under Review">مراجعة | Review</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>رابط المرفق | Attachment URL</label>
                        <input type="url" id="f09_attachment" placeholder="رابط صورة المخالفة أو التقرير (t09_fines_accidents.f09_attachment)">
                    </div>

                    <div class="form-group full-width">
                        <label>الوصف والتفاصيل | Description</label>
                        <textarea id="f08_description" rows="2" placeholder="اشرح تفاصيل الواقعة هنا (t09_fines_accidents.f08_description)"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="save-btn-red">حفظ البلاغ | Save Incident 🚨</button>
                    <button type="reset" class="secondary-btn">تفريغ | Reset 🔄</button>
                </div>
            </form>
        </div>

        <!-- Section 2: Unified Grid Controls -->
        <div id="tableControlsPlaceholder"></div>

        <!-- Section 3: Data Grid -->
        <div class="elegant-card grid-card">
            <div class="card-header">
                <span>📋 سجل الذمم والمخالفات | Incident Ledger</span>
            </div>
            <div id="finesTableContainer" class="table-responsive">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات... | Loading Data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="fines_accidents.js"></script>
</body>
</html>
<!-- END OF FILE: fines_accidents.html -->
