<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | السائقين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="drivers.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>👤 إدارة بيانات السائقين | Drivers Management</span>
            </div>
            
            <form id="driverForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>اسم السائق | Driver Name</label><input type="text" id="f02_name" required></div>
                    <div class="form-group"><label>الرقم الوطني | National ID</label><input type="text" id="f03_national_no" required></div>
                    <div class="form-group"><label>رقم الهاتف | Mobile Number</label><input type="text" id="f04_mobile" required></div>
                    <div class="form-group"><label>الموقع الجغرافي (رابط) | Location URL</label><input type="url" id="f06_location_url" placeholder="https://maps.google.com/..."></div>
                    <div class="form-group full-width">
                        <label>العنوان بالتفصيل | Detailed Address</label>
                        <textarea id="f05_address" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card">
            <div class="excel-controls" style="display: flex; align-items: center; justify-content: flex-start; gap: 20px; padding: 10px;">
                <span style="white-space: nowrap; font-weight: bold; color: var(--taxi-dark);">📋 سجل السائقين</span>
                <input type="text" id="excelSearch" placeholder="بحث سريع..." onkeyup="excelFilter()" 
                       style="width: 300px; padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd;">
                <div class="record-badge">
                    <span id="recordCount" style="margin-left: 5px;">0</span> سجل
                </div>
            </div>
            <div id="tableContainer" class="table-responsive"></div>
        </div>
    </main>

    <script src="drivers.js"></script>
    <script>
        window.onload = () => { 
            bootSystem("إدارة السائقين"); 
            loadData(); 
            startTaxiClock();
        };
    </script>
</body>
</html>
