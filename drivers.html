<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | السائقين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="drivers.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>👤 إدارة بيانات السائقين | Drivers Management</span>
            </div>
            
            <form id="driverForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>اسم السائق</label><input type="text" id="f02_name" required></div>
                    <div class="form-group"><label>الرقم الوطني</label><input type="text" id="f03_national_no"></div>
                    <div class="form-group"><label>رقم الهاتف</label><input type="text" id="f04_mobile" required></div>
                    <div class="form-group">
                        <label>فئة الرخصة</label>
                        <select id="f05_license_type">
                            <option value="عمومي">عمومي</option>
                            <option value="خصوصي">خصوصي</option>
                        </select>
                    </div>
                    <div class="form-group"><label>انتهاء الرخصة</label><input type="date" id="f06_license_expiry"></div>
                    <div class="form-group">
                        <label>الحالة</label>
                        <select id="f07_status">
                            <option value="نشط">نشط</option>
                            <option value="إجازة">إجازة</option>
                            <option value="موقوف">موقوف</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>ملاحظات</label><textarea id="f08_notes" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card" style="padding: 0;">
            <div class="table-header-controls">
                <div class="record-badge">
                    <span id="pageRecordCount">0</span> سائق
                </div>
                <div class="global-search-wrapper">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="بحث شامل..." onkeyup="multiColumnSearch()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div id="tableContainer" class="table-responsive" style="padding: 0 20px 20px 20px;"></div>
        </div>
    </main>

    <script src="drivers.js"></script>
    <script>
        window.onload = () => { 
            bootSystem("إدارة السائقين"); 
            loadData(); 
            startTaxiClock();
        };
    </script>
</body>
</html>
