<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- 
    File: drivers.html
    Version: v1.3.0
    Function: إدارة بيانات السائقين | Driver Management Center
    Design: Dual-Language Luxury Format
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السائقين | Drivers Management</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="drivers.css">
    <link rel="stylesheet" href="revenues.css">
</head>
<body onload="bootSystem('إدارة السائقين | Drivers')">

    <div class="main-container">
        
        <!-- Header -->
        <div class="luxury-page-header">
            <div class="header-info">
                <h1>👨‍✈️ السائقين | Drivers</h1>
                <p>إدارة سجلات السائقين والحالة التشغيلية | Driver Records & Status</p>
            </div>
        </div>

        <!-- Entry Form -->
        <div class="elegant-card luxury-card-border">
            <div class="card-header">
                <span>📝 نماذج البيانات | Data Entry Form</span>
            </div>
            <form id="driverForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>الاسم الكامل | Driver Name</label>
                        <input type="text" id="f02_name" placeholder="الاسم الرباعي (t02_drivers.f02_name)" required>
                    </div>
                    <div class="form-group">
                        <label>الرقم الوطني | National ID</label>
                        <input type="text" id="f03_national_no" placeholder="10 خانات (t02_drivers.f03_national_no)" required>
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف | Mobile No</label>
                        <input type="tel" id="f04_mobile" placeholder="07XXXXXXXX (t02_drivers.f04_mobile)" required>
                    </div>
                    <div class="form-group">
                        <label>عنوان السكن | Address</label>
                        <input type="text" id="f05_address" placeholder="المدينة/المنطقة (t02_drivers.f05_address)">
                    </div>

                    <div class="form-group">
                        <label>الحالة | Status</label>
                        <input type="text" id="f06_status" readonly style="background:#f9f9f9; cursor:not-allowed;" title="تُحدث تلقائياً من التسليم">
                    </div>
                    <div class="form-group">
                        <label>السيارة الحالية | Current Car</label>
                        <input type="text" id="f08_car_no" placeholder="تُحدث تلقائياً من التسليم (t02_drivers.f08_car_no)" readonly style="background:#f9f9f9; cursor:not-allowed;">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-btn">حفظ البيانات | Save Data ✅</button>
                    <button type="reset" class="secondary-btn" onclick="resetForm()">تفريغ | Reset 🔄</button>
                </div>
            </form>
        </div>

        <!-- Unified Grid Controls -->
        <div id="tableControlsPlaceholder"></div>

        <!-- Data Grid -->
        <div class="elegant-card grid-card">
            <div class="card-header">
                <span>📋 سجل السائقين | Drivers Ledger</span>
            </div>
            <div id="tableContainer" class="table-responsive">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات... | Loading Data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="drivers.js"></script>
</body>
</html>
<!-- END OF FILE: drivers.html -->
