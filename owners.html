<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | الملاك</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="owners.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>👥 إدارة الملاك | Owners Management</span>
                
            </div>
            
            <form id="ownerForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>اسم المالك</label><input type="text" id="f02_owner_name" required></div>
                    <div class="form-group"><label>رقم الهوية / السجل</label><input type="text" id="f03_national_id"></div>
                    <div class="form-group"><label>رقم التواصل</label><input type="text" id="f04_contact_number" required></div>
                    <div class="form-group full-width">
                        <label>العنوان</label>
                        <textarea id="f05_address" rows="2"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>ملاحظات</label>
                        <textarea id="f06_notes" rows="2"></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card" style="padding: 0;">
            <div class="table-header-controls">
                <div class="record-badge">
                    <span id="pageRecordCount">0</span> مالك
                </div>
                <div class="global-search-wrapper">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="بحث شامل..." onkeyup="window.multiColumnSearch()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div id="tableContainer" class="table-responsive" style="padding: 0 20px 20px 20px;"></div>
        </div>
    </main>

    <script src="owners.js"></script>
    <script>
        window.onload = () => { 
            bootSystem("إدارة الملاك"); 
            loadData();
        };
    </script>
</body>
</html>
