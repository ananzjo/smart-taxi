<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي | لوحة التحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="cars-style.css"> <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-right: 5px solid var(--taxi-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--taxi-dark); margin: 10px 0; }
        .stat-label { color: #666; font-size: 1rem; }
        .stat-icon { font-size: 2rem; }
    </style>
</head>
<body>
    <main class="main-container">
        <h2 style="margin-bottom: 20px;">📊 نظرة عامة على النظام</h2>
        
        <div class="dashboard-grid">
            
            <div class="stat-card" style="border-right-color: #9b59b6;">
    <div class="stat-icon">🗓️</div>
    <div class="stat-label">إيراد الشهر الحالي | Monthly</div>
    <div id="monthRevenue" class="stat-value">0.00</div>
</div>
            
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">إيراد اليوم | Today's Revenue</div>
                <div id="todayRevenue" class="stat-value">0.00</div>
            </div>

            <div class="stat-card" style="border-right-color: var(--taxi-green);">
                <div class="stat-icon">🚖</div>
                <div class="stat-label">السيارات النشطة | Active Cars</div>
                <div id="activeCarsCount" class="stat-value">0</div>
            </div>

            <div class="stat-card" style="border-right-color: #3498db;">
                <div class="stat-icon">👨‍✈️</div>
                <div class="stat-label">السائقين المسجلين | Drivers</div>
                <div id="driversCount" class="stat-value">0</div>
            </div>
        </div>

        <div class="elegant-card">
            <h3>📈 آخر عمليات الإيرادات</h3>
            <div id="recentTransactions" class="table-responsive">
                </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
    <script>
        window.onload = async () => {
            bootSystem("لوحة التحكم الرئيسيّة");
            await loadDashboardStats();
        };
    </script>
</body>
</html>
