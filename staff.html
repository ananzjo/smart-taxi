<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | الموظفين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="staff.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>👥 إدارة بيانات الموظفين والصلاحيات | Staff Management</span>
                <div id="live-clock" style="font-size: 0.9rem; color: #fff;"></div>
            </div>
            
            <form id="staffForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>اسم الموظف | Name</label><input type="text" id="f02_name" required placeholder="الاسم الكامل"></div>
                    <div class="form-group"><label>كلمة المرور | Password</label><input type="password" id="f03_password" required placeholder="******"></div>
                    <div class="form-group"><label>رقم الهاتف | Mobile</label><input type="tel" id="f04_mobile" placeholder="05xxxxxxxx"></div>
                    <div class="form-group"><label>المسمى الوظيفي | Title</label><input type="text" id="f05_title" placeholder="مثلاً: مدير حركة"></div>
                    <div class="form-group">
                        <label>الصلاحية | Authority</label>
                        <select id="f06_authority" required>
                            <option value="مستخدم | User">موظف | User</option>
                            <option value="مدير | Admin">مدير نظام | Admin</option>
                            <option value="مالك | Owner">مالك | Owner</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-main">حفظ الموظف | Save Staff</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card">
            <div class="excel-controls">
                <span>📋 سجل الموظفين | Staff Registry</span>
                <input type="text" id="excelSearch" placeholder="بحث سريع عن موظف..." onkeyup="excelFilter()">
            </div>
            <div class="table-info-bar">
    <span class="record-badge">عدد السجلات: <span id="recordCount">0</span></span>
</div>
<div id="tableContainer" class="table-responsive"></div>
        </div>
    </main>

    <div id="customModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">تنبيه</h3>
            <p id="modalMessage"></p>
            <div class="modal-btns">
                <button id="modalConfirmBtn" class="btn-main">موافق</button>
                <button id="modalCancelBtn" class="btn-sub">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="global-config.js"></script>
    <script src="staff.js"></script>

    <script>
    // تأكد أن النظام أقلع أولاً ثم حمل البيانات
    bootSystem('إدارة الموظفين');
    loadData();
</script>
    
</body>
</html>
