<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | الموظفين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="staff.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>👥 إدارة الموظفين | Staff Management</span>
                
            </div>
            
            <form id="staffForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>الاسم الكامل | Full Name</label><input type="text" id="f02_full_name" required></div>
                    <div class="form-group"><label>رقم الهوية | ID Number</label><input type="text" id="f03_id_number" required></div>
                    <div class="form-group"><label>رقم الجوال | Mobile Number</label><input type="text" id="f04_mobile_number" required></div>
                    <div class="form-group"><label>الجنسية | Nationality</label><input type="text" id="f05_nationality" required></div>
                    <div class="form-group"><label>الوظيفة | Job Title</label><input type="text" id="f06_job_title" required></div>
                    <div class="form-group"><label>الراتب | Salary</label><input type="number" step="0.01" id="f07_salary" required></div>
                    </div>
                    <div class="form-group full-width">
                        <label>ملاحظات | Notes</label>
                        <textarea id="f08_notes" rows="2"></textarea>
                    </div>
                
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card">
            <div class="excel-controls" style="display: flex; align-items: center; justify-content: flex-start; gap: 20px; padding: 10px;">
                
                <span style="white-space: nowrap; font-weight: bold; color: var(--taxi-dark);">📋 سجل الموظفين</span>
        
                <input type="text" id="excelSearch" placeholder="بحث سريع..." onkeyup="excelFilter()" 
                       style="width: 300px; padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd;">
        
                <div class="record-badge">
                    <span id="recordCount" style="margin-left: 5px;">0</span> سجل
                </div>
            </div>
        
            <div id="tableContainer">
                </div>
        </div>
<div id="tableContainer" class="table-responsive"></div>
        </div>
    </main>

    <script src="staff.js"></script>
    <script>
        window.onload = () => { 
            bootSystem("إدارة الموظفين"); 
            loadData();
        };
    </script>
</body>
</html>
