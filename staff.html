<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة التاكسي الذكي | الموظفين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="staff.css">
</head>
<body>
    <main class="main-container">
        <div class="elegant-card">
            <div class="card-header header-flex">
                <span>👥 إدارة الموظفين | Staff Management</span>
                
            </div>
            
            <form id="staffForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group"><label>الاسم الكامل | Full Name</label><input type="text" id="f02_name" required></div>
                    <div class="form-group"><label>اسم المستخدم | Login Name</label><input type="text" id="f08_login_name" required></div>
                    <div class="form-group"><label>كلمة المرور | Password</label><input type="password" id="f03_password" placeholder="اتركها فارغة للإبقاء على الحالية"></div>
                    <div class="form-group"><label>رقم الجوال | Mobile</label><input type="text" id="f04_mobile"></div>
                    <div class="form-group"><label>المسمى الوظيفي | Title</label><input type="text" id="f05_title"></div>
                    <div class="form-group">
                        <label>الصلاحية | Authority</label>
                        <select id="f06_authority">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" onclick="saveData()" class="btn-main">حفظ البيانات | Save</button>
                    <button type="button" onclick="confirmReset()" class="btn-sub">تفريغ | Clear</button>
                </div>
            </form>
        </div>

        <div class="elegant-card" style="padding: 0;">
            <div class="table-header-controls">
                <div class="record-badge">
                    <span id="pageRecordCount">0</span> موظف
                </div>
                <div class="global-search-wrapper">
                    <input type="text" id="globalSearch" class="global-search-input" placeholder="بحث شامل..." onkeyup="multiColumnSearch()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div id="tableContainer" class="table-responsive" style="padding: 0 20px 20px 20px;"></div>
        </div>
    </main>

    <script src="staff.js"></script>
    <script>
        window.onload = () => { 
            bootSystem("إدارة الموظفين"); 
            loadData();
        };
    </script>
</body>
</html>
