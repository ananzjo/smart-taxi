<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- 
    File: revenues.html
    Version: v1.3.0
    Function: إدارة التحصيلات والإيرادات | Revenue & Collections Center
    Design: Dual-Language Luxury Format
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الإيرادات | Revenues Management</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="revenues.css">
</head>
<body onload="bootSystem('إدارة الإيرادات | Revenues')">

    <div class="main-container">
        
        <!-- Header -->
        <div class="luxury-page-header">
            <div class="header-info">
                <h1>💰 الإيرادات والتحصيل | Revenues</h1>
                <p>تسجيل المقبوضات اليومية والتسويات المالية | Daily Cash Receipts & Settlements</p>
            </div>
        </div>

        <!-- Entry Form -->
        <div class="elegant-card luxury-card-border">
            <div class="card-header">
                <span>📝 نماذج البيانات | Data Entry Form</span>
            </div>
            <form id="revenueForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>التاريخ | Collection Date</label>
                        <input type="date" id="f02_date" required title="تاريخ التحصيل (t05_revenues.f02_date)">
                    </div>

                    <div class="form-group">
                        <label>رقم السيارة | Plate No</label>
                        <select id="f03_car_no" required title="رقم اللوحة (t05_revenues.f03_car_no)">
                            <option value="">-- اختر السيارة --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>اسم السائق | Driver Name</label>
                        <select id="f04_driver_name" required title="اسم السائق (t05_revenues.f04_driver_name)">
                            <option value="">-- اختر السائق --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>الفئة | Category</label>
                        <select id="f05_category" required>
                            <option value="ضمان يومي">ضمان يومي | Daily Rent</option>
                            <option value="دفعة مقدمة">دفعة مقدمة | Pre-payment</option>
                            <option value="مخالفة">مخالفة | Violation</option>
                            <option value="أخرى">أخرى | Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المبلغ | Amount</label>
                        <input type="number" step="0.5" id="f06_amount" placeholder="0.00 (t05_revenues.f06_amount)" required>
                    </div>

                    <div class="form-group">
                        <label>طريقة الدفع | Payment Method</label>
                        <select id="f07_method" required>
                            <option value="Cash|نقدي">نقدي | Cash</option>
                            <option value="Bank|بنك">بنك | Bank</option>
                            <option value="Cliq|محفظة">محفظة | E-Wallet</option>
                            <option value="Credit Card|بطاقة ائتمان">بطاقة ائتمان | Credit Card</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المحصل | Collector</label>
                        <select id="f08_collector" required title="الموظف المسؤول (t05_revenues.f08_collector)">
                            <option value="">-- اختر المحصل --</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>ملاحظات إضافية | Notes</label>
                        <textarea id="f09_notes" rows="2" placeholder="أي تفاصيل أخرى لعملية القبض (t05_revenues.f09_notes)"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" onclick="saveData(event)" class="primary-btn">حفظ البيانات | Save Data ✅</button>
                    <button type="reset" class="secondary-btn">تفريغ | Reset 🔄</button>
                </div>
            </form>
        </div>

        <!-- Unified Grid Controls -->
        <div id="tableControlsPlaceholder"></div>

        <!-- Data Grid -->
        <div class="elegant-card grid-card">
            <div class="card-header">
                <span>📋 سجل التحصيلات | Revenues Ledger</span>
            </div>
            <div id="tableContainer" class="table-responsive">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات... | Loading Data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="revenues.js"></script>
    <script>
        window.onload = async () => { 
            bootSystem("إدارة الإيرادات | Revenues"); 
            if(typeof fillRevenueDropdowns === 'function') await fillRevenueDropdowns(); 
            if(typeof loadData === 'function') await loadData(); 
            document.getElementById('f02_date').valueAsDate = new Date(); 
        };
    </script>
</body>
</html>
<!-- END OF FILE: revenues.html -->
