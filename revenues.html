<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الإيرادات | Revenues Management</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <script src="droplistsdata.js"></script>
    
    <link rel="stylesheet" href="revenues.css">
</head>
<body onload="bootSystem('إدارة الإيرادات | Revenues')">

    <div class="main-container">
        <div class="luxury-page-header">
            <div class="header-info">
                <h1>💰 الإيرادات والتحصيل | Revenues</h1>
                <p>تسجيل المقبوضات اليومية والتسويات المالية | Daily Cash Receipts & Settlements</p>
            </div>
        </div>

        <div class="elegant-card luxury-card-border">
            <div class="card-header">
                <span>📝 نماذج البيانات | Data Entry Form</span>
            </div>
            <form id="revenueForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>التاريخ | Collection Date</label>
                        <input type="date" id="f02_date" required>
                    </div>

                    <div class="form-group">
                        <label>رقم السيارة | Plate No</label>
                        <select id="f03_car_no" required>
                            <option value="">-- جاري التحميل --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>اسم السائق | Driver Name</label>
                        <select id="f04_driver_id" required>
                            <option value="">-- جاري التحميل --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>الفئة | Category</label>
                        <select id="f05_category" required></select>
                    </div>

                    <div class="form-group" id="workDayGroup" style="display:none;">
                        <label>مطابقة مع استحقاق | Match with Due</label>
                        <select id="f10_work_day_link">
                            <option value="">-- اختر ضمان للمطابقة --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المبلغ | Amount</label>
                        <input type="number" step="0.5" id="f06_amount" placeholder="0.00" required>
                    </div>

                    <div class="form-group">
                        <label>طريقة الدفع | Payment Method</label>
                        <select id="f07_method" required></select>
                    </div>

                    <div class="form-group">
                        <label>المحصل | Collector</label>
                        <select id="f08_collector_id" required>
                            <option value="">-- اختر المحصل --</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>ملاحظات إضافية | Notes</label>
                        <textarea id="f09_notes" rows="2" placeholder="أي تفاصيل أخرى لعملية القبض"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-btn">حفظ البيانات | Save Data ✅</button>
                    <button type="reset" class="secondary-btn" onclick="resetRevenueForm()">تفريغ | Reset 🔄</button>
                </div>
            </form>
        </div>

        <div id="tableControlsPlaceholder"></div>

        <div class="elegant-card grid-card">
            <div class="card-header">
                <span>📋 سجل التحصيلات | Revenues Ledger</span>
            </div>
            <div id="tableContainer" class="table-responsive">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات... | Loading Data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="revenues.js"></script>

    <script>
        // نداء واحد فقط عند تحميل النافذة بالكامل
        window.onload = async () => {
            // 1. تشغيل النظام العام (Sidebar, Clock, إلخ)
            if (typeof bootSystem === 'function') bootSystem('إدارة الإيرادات | Revenues');
            
            // 2. تعيين التاريخ
            const dateInput = document.getElementById('f02_date');
            if (dateInput) dateInput.valueAsDate = new Date();

            // 3. تشغيل منطق الصفحة من ملف JS الخارجي فقط
            if (typeof initRevenuesPage === 'function') {
                await initRevenuesPage();
            }
        };
    </script>
    
</body>
</html>
