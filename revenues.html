<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الإيرادات | Revenues Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    <link rel="stylesheet" href="revenues.css">
</head>
<body>

    <div class="main-container">
        <div class="luxury-page-header">
            <div class="header-info">
                <h1>💰 الإيرادات والتحصيل | Revenues</h1>
                <p>تسجيل المقبوضات اليومية والتسويات المالية | Daily Cash Receipts & Settlements</p>
            </div>
        </div>

        <div class="elegant-card luxury-card-border">
            <div class="card-header"><span>📝 نماذج البيانات | Data Entry Form</span></div>
            <form id="revenueForm" class="taxi-form">
                <input type="hidden" id="f01_id">
                <div class="input-grid">
                    <div class="form-group">
                        <label>التاريخ | Collection Date</label>
                        <input type="date" id="f02_date" required>
                    </div>
                    <div class="form-group">
                        <label>رقم السيارة | Plate No</label>
                        <select id="f03_car_no" required></select>
                    </div>
                    <div class="form-group">
                        <label>اسم السائق | Driver Name</label>
                        <select id="f04_driver_name" required></select>
                    </div>
                    <div class="form-group">
                        <label>الفئة | Category</label>
                        <select id="f05_category" required>
                            <option value="ضمان يومي">ضمان يومي | Daily Rent</option>
                            <option value="دفعة مقدمة">دفعة مقدمة | Pre-payment</option>
                            <option value="مخالفة">مخالفة | Violation</option>
                            <option value="أخرى">أخرى | Other</option>
                        </select>
                    </div>
                    <div class="form-group" id="workDayGroup" style="display:none;">
                        <label style="color: #d9534f; font-weight: bold;">⚠️ مطابقة مع ضمان مستحق</label>
                        <select id="f10_work_day_link"></select>
                    </div>
                    <div class="form-group">
                        <label>المبلغ | Amount</label>
                        <input type="number" step="0.5" id="f06_amount" required>
                    </div>
                    <div class="form-group">
                        <label>طريقة الدفع | Method</label>
                        <select id="f07_method" required>
                            <option value="نقدي">نقدي | Cash</option>
                            <option value="بنك">بنك | Bank</option>
                            <option value="محفظة">محفظة | Cliq</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>المحصل | Collector</label>
                        <select id="f08_collector" required></select>
                    </div>
                    <div class="form-group full-width">
                        <label>ملاحظات | Notes</label>
                        <textarea id="f09_notes" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" onclick="saveData(event)" class="primary-btn">حفظ | Save ✅</button>
                    <button type="button" onclick="resetFieldsOnly()" class="secondary-btn">تفريغ | Reset 🔄</button>
                </div>
            </form>
        </div>

        <div id="tableControlsPlaceholder"></div>

        <div class="elegant-card grid-card">
            <div class="card-header"><span>📋 سجل التحصيلات | Revenues Ledger</span></div>
            <div id="tableContainer" class="table-responsive"></div>
        </div>
    </div>

    <script src="revenues.js"></script>
</body>
</html>
